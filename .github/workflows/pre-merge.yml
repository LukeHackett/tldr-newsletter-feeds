name: Pre-merge checks

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (dry run)
        env:
          # Provide a dummy Pages URL so feed self-links resolve without error
          GITHUB_PAGES_URL: "http://localhost:3000"
        run: npm run build
